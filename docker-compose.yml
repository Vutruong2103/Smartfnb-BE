services:

  # ================================================================
  # PostgreSQL 16 — Database chính
  # ================================================================
  postgres:
    image: postgres:16-alpine
    container_name: smartfnb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartfnb
      POSTGRES_USER: smartfnb
      POSTGRES_PASSWORD: smartfnb123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"          # Expose ra host để DBeaver kết nối
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartfnb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfnb -d smartfnb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================================================
  # Redis 7 — In-memory Cache & Message Broker
  # ================================================================
  redis:
    image: redis:7-alpine
    container_name: smartfnb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - smartfnb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================================================
  # SmartF&B Backend — Spring Boot 3.3
  # ================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartfnb-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # Chờ Postgres sẵn sàng trước
      redis:
        condition: service_healthy   # Chờ Redis sẵn sàng trước
    environment:
      # Database
      DB_HOST: postgres              # Tên service trong Docker network
      DB_PORT: 5432
      DB_NAME: smartfnb
      DB_USER: smartfnb
      DB_PASS: smartfnb123
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # JWT (thay bằng secret mạnh hơn trong production)
      JWT_SECRET: SmartFnbSuperSecretKeyForDockerDeploy2026ChangeMe!@#$%
      JWT_EXPIRATION_MS: 3600000
      JWT_REFRESH_MS: 604800000
      # Server
      SERVER_PORT: 8080
      # Logging
      SPRING_PROFILES_ACTIVE: docker
      # File Storage
      UPLOAD_DIR: /app/uploads   # Path trong container — mount tới named volume
      BASE_URL: http://localhost:8080
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"          # API backend
    networks:
      - smartfnb-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s      # Chờ app khởi động xong (Flyway migration cần thời gian)
      retries: 3

# ================================================================
# Volumes — lưu trữ persistent data
# ================================================================
volumes:
  postgres_data:
    name: smartfnb-postgres-data
  uploads_data:
    name: smartfnb-uploads-data   # Ảnh món ăn persist qua container restart

# ================================================================
# Networks
# ================================================================
networks:
  smartfnb-net:
    name: smartfnb-network
    driver: bridge
